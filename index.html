<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forge Your Legacy — Backyard Ultra Roman Ranks</title>
    <meta name="description" content="Rise through the ranks of the Backyard Ultra. From Legionnaire to Princeps Civitatis — earn your title by going the distance.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* ============================================
           CSS CUSTOM PROPERTIES
           ============================================ */
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #111111;
            --bg-card: #141414;
            --gold-primary: #c9a84c;
            --gold-light: #e8d48b;
            --gold-dark: #8b6914;
            --gold-glow: rgba(201, 168, 76, 0.3);
            --gold-glow-strong: rgba(201, 168, 76, 0.6);
            --bronze: #a0824d;
            --cream: #f0e6d0;
            --cream-muted: #b0a489;
            --text-primary: #f5f0e8;
            --text-secondary: #9a917f;
            --font-display: 'Cinzel', serif;
            --font-body: 'Inter', sans-serif;
            --timeline-height: 180px;
        }

        /* ============================================
           RESET & BASE
           ============================================ */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            scroll-padding-top: calc(var(--timeline-height) + 40px);
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: var(--font-body);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* ============================================
           PARTICLE CANVAS
           ============================================ */
        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        /* ============================================
           HERO SECTION
           ============================================ */
        .hero {
            position: relative;
            min-height: 70vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 80px 20px 60px;
            z-index: 1;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse at center top, rgba(201, 168, 76, 0.08) 0%, transparent 60%);
            pointer-events: none;
        }

        .hero-ornament {
            width: 80px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold-primary), transparent);
            margin-bottom: 30px;
            opacity: 0;
            animation: fadeSlideUp 1s ease 0.3s forwards;
        }

        .hero-subtitle-top {
            font-family: var(--font-display);
            font-size: 0.85rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: var(--gold-primary);
            margin-bottom: 20px;
            opacity: 0;
            animation: fadeSlideUp 1s ease 0.5s forwards;
        }

        .hero-title {
            font-family: var(--font-display);
            font-size: clamp(2.5rem, 7vw, 5rem);
            font-weight: 700;
            color: var(--gold-light);
            line-height: 1.1;
            margin-bottom: 24px;
            background: linear-gradient(180deg, var(--gold-light) 0%, var(--gold-primary) 50%, var(--gold-dark) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            opacity: 0;
            animation: fadeSlideUp 1s ease 0.7s forwards;
        }

        .hero-tagline {
            font-family: var(--font-body);
            font-size: 1.1rem;
            font-weight: 300;
            color: var(--cream-muted);
            max-width: 500px;
            letter-spacing: 1px;
            margin-bottom: 30px;
            opacity: 0;
            animation: fadeSlideUp 1s ease 0.9s forwards;
        }

        .hero-ornament-bottom {
            width: 120px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold-dark), transparent);
            opacity: 0;
            animation: fadeSlideUp 1s ease 1.1s forwards;
        }

        .hero-scroll-hint {
            position: absolute;
            bottom: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0;
            animation: fadeSlideUp 1s ease 1.3s forwards;
        }

        .hero-scroll-hint .arrow {
            width: 20px;
            height: 20px;
            border-right: 1px solid var(--gold-primary);
            border-bottom: 1px solid var(--gold-primary);
            transform: rotate(45deg);
            animation: bounceDown 2s ease infinite;
        }

        /* ============================================
           STICKY TIMELINE
           ============================================ */
        .timeline-wrapper {
            position: sticky;
            top: 0;
            z-index: 100;
            background: linear-gradient(180deg, var(--bg-primary) 0%, rgba(10, 10, 10, 0.97) 100%);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(201, 168, 76, 0.15);
            padding: 16px 0 12px;
            transition: box-shadow 0.3s ease;
        }

        .timeline-wrapper.scrolled {
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5), 0 1px 0 rgba(201, 168, 76, 0.1);
        }

        .timeline-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 30px;
            overflow-x: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .timeline-container::-webkit-scrollbar {
            display: none;
        }

        .timeline {
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            min-width: 900px;
            padding: 0 10px;
        }

        /* The horizontal line — positioned through the dot area */
        .timeline::before {
            content: '';
            position: absolute;
            left: 10px;
            right: 10px;
            top: 50%;
            height: 2px;
            background: linear-gradient(90deg, var(--gold-dark), var(--gold-primary), var(--gold-dark));
            opacity: 0.4;
            transform: translateY(12px);
        }

        .timeline-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.3s ease;
            position: relative;
            flex: 1;
            padding: 0 4px;
        }

        .timeline-item:hover {
            transform: translateY(-3px);
        }

        /* Stats ABOVE the thumbnail */
        .timeline-stats-top {
            text-align: center;
            margin-bottom: 6px;
            flex-shrink: 0;
        }

        .timeline-hours {
            font-family: var(--font-display);
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--gold-primary);
            line-height: 1.2;
        }

        .timeline-distance {
            font-family: var(--font-body);
            font-size: 0.65rem;
            color: var(--text-secondary);
            white-space: nowrap;
        }

        .timeline-item:hover .timeline-hours,
        .timeline-item.active .timeline-hours {
            color: var(--gold-light);
        }

        .timeline-item:hover .timeline-distance,
        .timeline-item.active .timeline-distance {
            color: var(--cream-muted);
        }

        .timeline-thumb {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid rgba(201, 168, 76, 0.3);
            margin-bottom: 6px;
            transition: all 0.3s ease;
            background: var(--bg-secondary);
            flex-shrink: 0;
        }

        .timeline-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            transition: filter 0.3s ease;
        }

        .timeline-item:hover .timeline-thumb,
        .timeline-item.active .timeline-thumb {
            border-color: var(--gold-primary);
            box-shadow: 0 0 15px var(--gold-glow), 0 0 30px rgba(201, 168, 76, 0.1);
        }

        .timeline-item:hover .timeline-thumb img,
        .timeline-item.active .timeline-thumb img {
            filter: brightness(1.1);
        }

        /* Dot on the line */
        .timeline-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--gold-dark);
            border: 2px solid var(--bg-primary);
            margin-bottom: 6px;
            transition: all 0.3s ease;
            flex-shrink: 0;
            position: relative;
            z-index: 2;
        }

        .timeline-item:hover .timeline-dot,
        .timeline-item.active .timeline-dot {
            background: var(--gold-primary);
            box-shadow: 0 0 10px var(--gold-glow);
            transform: scale(1.3);
        }

        /* Rank title BELOW the dot */
        .timeline-title {
            font-family: var(--font-display);
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
            white-space: nowrap;
            transition: color 0.3s ease;
            text-align: center;
        }

        .timeline-item:hover .timeline-title,
        .timeline-item.active .timeline-title {
            color: var(--gold-primary);
        }

        /* ============================================
           RANK DETAIL SECTIONS
           ============================================ */
        .ranks-container {
            position: relative;
            z-index: 1;
            padding: 60px 0 100px;
        }

        .rank-section {
            max-width: 1100px;
            margin: 0 auto 80px;
            padding: 0 40px;
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .rank-section.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .rank-card {
            display: flex;
            align-items: center;
            gap: 60px;
            background: linear-gradient(135deg, rgba(20, 20, 20, 0.8) 0%, rgba(15, 15, 15, 0.6) 100%);
            border: 1px solid rgba(201, 168, 76, 0.1);
            border-radius: 16px;
            padding: 50px;
            position: relative;
            overflow: hidden;
            transition: border-color 0.4s ease, box-shadow 0.4s ease;
        }

        .rank-card:hover {
            border-color: rgba(201, 168, 76, 0.25);
            box-shadow: 0 8px 60px rgba(0, 0, 0, 0.3), inset 0 0 60px rgba(201, 168, 76, 0.03);
        }

        /* Subtle corner accent */
        .rank-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, rgba(201, 168, 76, 0.1) 0%, transparent 60%);
            border-radius: 16px 0 0 0;
        }

        .rank-card::after {
            content: '';
            position: absolute;
            bottom: 0;
            right: 0;
            width: 80px;
            height: 80px;
            background: linear-gradient(315deg, rgba(201, 168, 76, 0.05) 0%, transparent 60%);
            border-radius: 0 0 16px 0;
        }

        .rank-image-wrapper {
            flex-shrink: 0;
            width: 280px;
            height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .rank-image-wrapper::before {
            content: '';
            position: absolute;
            inset: -10px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--gold-glow) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .rank-card:hover .rank-image-wrapper::before {
            opacity: 1;
        }

        .rank-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 4px 20px rgba(0, 0, 0, 0.4));
            transition: transform 0.5s ease, filter 0.5s ease;
        }

        .rank-card:hover .rank-image {
            transform: scale(1.05);
            filter: drop-shadow(0 4px 30px rgba(201, 168, 76, 0.2));
        }

        .rank-info {
            flex: 1;
            min-width: 0;
        }

        .rank-number {
            font-family: var(--font-display);
            font-size: 0.7rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--gold-dark);
            margin-bottom: 8px;
        }

        .rank-name {
            font-family: var(--font-display);
            font-size: clamp(1.5rem, 3vw, 2.2rem);
            font-weight: 700;
            background: linear-gradient(180deg, var(--gold-light) 0%, var(--gold-primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.2;
            margin-bottom: 16px;
        }

        .rank-stats {
            display: flex;
            gap: 24px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .rank-stat {
            display: flex;
            flex-direction: column;
        }

        .rank-stat-value {
            font-family: var(--font-display);
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--gold-primary);
            line-height: 1;
        }

        .rank-stat-label {
            font-family: var(--font-body);
            font-size: 0.7rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-top: 4px;
        }

        .rank-divider {
            width: 50px;
            height: 1px;
            background: linear-gradient(90deg, var(--gold-primary), transparent);
            margin-bottom: 20px;
        }

        .rank-subtitle {
            font-family: var(--font-display);
            font-size: 0.85rem;
            color: var(--gold-primary);
            letter-spacing: 1px;
            margin-bottom: 12px;
            font-style: italic;
        }

        .rank-description {
            font-family: var(--font-body);
            font-size: 0.95rem;
            font-weight: 300;
            color: var(--cream-muted);
            line-height: 1.8;
            max-width: 450px;
        }

        /* Special treatment for the final rank */
        .rank-section.final-rank .rank-card {
            border-color: rgba(201, 168, 76, 0.25);
            background: linear-gradient(135deg, rgba(25, 20, 10, 0.9) 0%, rgba(15, 12, 5, 0.7) 100%);
        }

        .rank-section.final-rank .rank-card::before {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, rgba(201, 168, 76, 0.15) 0%, transparent 60%);
        }

        /* ============================================
           FOOTER
           ============================================ */
        .footer {
            text-align: center;
            padding: 40px 20px 60px;
            position: relative;
            z-index: 1;
        }

        .footer-ornament {
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold-dark), transparent);
            margin: 0 auto 20px;
        }

        .footer-text {
            font-family: var(--font-display);
            font-size: 0.75rem;
            color: var(--text-secondary);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* ============================================
           ANIMATIONS
           ============================================ */
        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes bounceDown {
            0%, 100% { transform: rotate(45deg) translateY(0); }
            50% { transform: rotate(45deg) translateY(6px); }
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        /* ============================================
           RESPONSIVE
           ============================================ */
        @media (max-width: 768px) {
            :root {
                --timeline-height: 160px;
            }

            .hero {
                min-height: 60vh;
                padding: 60px 20px 40px;
            }

            .timeline-container {
                padding: 0 15px;
            }

            .timeline {
                min-width: 800px;
                gap: 5px;
            }

            .timeline-thumb {
                width: 50px;
                height: 50px;
            }

            .rank-section {
                padding: 0 20px;
                margin-bottom: 50px;
            }

            .rank-card {
                flex-direction: column;
                padding: 30px 24px;
                gap: 30px;
                text-align: center;
            }

            .rank-image-wrapper {
                width: 200px;
                height: 200px;
            }

            .rank-stats {
                justify-content: center;
            }

            .rank-divider {
                margin: 0 auto 20px;
            }

            .rank-description {
                max-width: 100%;
            }

            .rank-info {
                display: flex;
                flex-direction: column;
                align-items: center;
            }
        }

        @media (max-width: 480px) {
            .hero-title {
                font-size: 2rem;
            }

            .rank-image-wrapper {
                width: 160px;
                height: 160px;
            }

            .rank-card {
                padding: 24px 18px;
            }

            .rank-stat-value {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>

    <!-- Particle Background -->
    <canvas id="particles-canvas"></canvas>

    <!-- ==========================================
         HERO SECTION
         ========================================== -->
    <section class="hero" id="hero">
        <div class="hero-ornament"></div>
        <p class="hero-subtitle-top">Backyard Ultra</p>
        <h1 class="hero-title">Forge Your Legacy</h1>
        <p class="hero-tagline">Rise through the ranks. Earn your title. Go the distance.</p>
        <div class="hero-ornament-bottom"></div>
        <div class="hero-scroll-hint">
            <span>Explore Ranks</span>
            <div class="arrow"></div>
        </div>
    </section>

    <!-- ==========================================
         STICKY TIMELINE
         ========================================== -->
    <div class="timeline-wrapper" id="timeline-wrapper">
        <div class="timeline-container">
            <nav class="timeline" id="timeline" role="navigation" aria-label="Rank Timeline">
                <!-- Timeline items generated by JS -->
            </nav>
        </div>
    </div>

    <!-- ==========================================
         RANK DETAIL SECTIONS
         ========================================== -->
    <main class="ranks-container" id="ranks-container">
        <!-- Rank sections generated by JS -->
    </main>

    <!-- ==========================================
         FOOTER
         ========================================== -->
    <footer class="footer">
        <div class="footer-ornament"></div>
        <p class="footer-text">Every yard counts. Every hour matters.</p>
    </footer>

    <script>
        // ============================================
        // DATA
        // ============================================
        const ranks = [
            {
                id: 'legionnaire',
                rank: 'Legionnaire',
                hours: 15,
                distanceKm: 101,
                distanceMi: '100 Km',
                subtitle: 'The Engine Room',
                description: "You've put in the work to build a solid base. Like the Roman infantry, you're the backbone of the pack: reliable, resilient, and just getting started.",
                image: '15 Legionaire.jpg'
            },
            {
                id: 'centurion',
                rank: 'Centurion',
                hours: 24,
                distanceKm: 161,
                distanceMi: '100 Mi',
                subtitle: 'The Pace Setter',
                description: "You've moved past the \"beginner\" phase. You've got the grit of a seasoned veteran who knows how to hold a line when the lungs start to burn.",
                image: '24 Centurion.jpg'
            },
            {
                id: 'tribunis-militum',
                rank: 'Tribunis Militum',
                hours: 36,
                distanceKm: 241,
                distanceMi: '150 Mi',
                subtitle: 'Tactical Stamina',
                description: "You aren't just running; you're managing your effort like a pro. You've found your \"forever pace\" and have the discipline to stick to it.",
                image: '36 Tribunis Militum.jpg'
            },
            {
                id: 'praefectus-castrorum',
                rank: 'Praefectus Castrorum',
                hours: 48,
                distanceKm: 322,
                distanceMi: '200 Mi',
                subtitle: 'The Road Warrior',
                description: "200 miles is no accident. You've mastered the logistics of recovery, fueling, and mental toughness. You own every camp and every trail.",
                image: '48 Praefectus Castrorum.jpg'
            },
            {
                id: 'tribunis-laticlavius',
                rank: 'Tribunis Laticlavius',
                hours: 72,
                distanceKm: 483,
                distanceMi: '300 Mi',
                subtitle: 'The Elite Vanguard',
                description: "You're operating at a level most people don't even try for. You've got the high-end motor and the heavy-duty endurance to back it up.",
                image: '72 Tribunis Laticlavius.jpg'
            },
            {
                id: 'legatus-legionis',
                rank: 'Legatus Legionis',
                hours: 100,
                distanceKm: 671,
                distanceMi: '417 Mi / 671 Km',
                subtitle: 'The Distance Specialist',
                description: "417 miles isn't a hobby; it's a takeover. You command the road. When you're on the path, the miles don't stand a chance.",
                image: '100 Legatus Legionis.jpg'
            },
            {
                id: 'praetor',
                rank: 'Praetor',
                hours: 120,
                distanceKm: 805,
                distanceMi: '500 Mi',
                subtitle: 'Full Imperium',
                description: "You've earned the \"right to rule\" the long run. 500 miles is where the body wants to quit, but your mind has total executive control.",
                image: '120 Praetor.jpg'
            },
            {
                id: 'consul',
                rank: 'Consul',
                hours: 144,
                distanceKm: 966,
                distanceMi: '600 Mi',
                subtitle: 'The Pinnacle',
                description: "600 miles is legendary status. You've reached the top of the food chain. You don't just run the distance; you've officially conquered it.",
                image: '144 Consul.jpg'
            },
            {
                id: 'princeps-civitatis',
                rank: 'Princeps Civitatis',
                hours: 168,
                distanceKm: 1127,
                distanceMi: '700 Mi',
                subtitle: 'The First Citizen of Finish Lines',
                description: "When the distance gets \"impossible,\" you're the one who gets it done. You are the ultimate authority on what a human body can endure.",
                image: '168 Princeps Civitatis.jpg'
            }
        ];

        // ============================================
        // RENDER TIMELINE
        // ============================================
        function renderTimeline() {
            const timeline = document.getElementById('timeline');
            timeline.innerHTML = ranks.map((rank, i) => `
                <div class="timeline-item" data-target="${rank.id}" role="button" tabindex="0" aria-label="Jump to ${rank.rank}">
                    <div class="timeline-stats-top">
                        <div class="timeline-hours">${rank.hours}h</div>
                        <div class="timeline-distance">${rank.distanceMi}</div>
                    </div>
                    <div class="timeline-thumb">
                        <img src="${rank.image}" alt="${rank.rank} insignia" loading="lazy">
                    </div>
                    <div class="timeline-dot"></div>
                    <div class="timeline-title">${rank.rank}</div>
                </div>
            `).join('');
        }

        // ============================================
        // RENDER RANK SECTIONS
        // ============================================
        function renderRanks() {
            const container = document.getElementById('ranks-container');
            container.innerHTML = ranks.map((rank, i) => `
                <section class="rank-section ${i === ranks.length - 1 ? 'final-rank' : ''}" id="${rank.id}">
                    <div class="rank-card">
                        <div class="rank-image-wrapper">
                            <img class="rank-image" src="${rank.image}" alt="${rank.rank} insignia" loading="lazy">
                        </div>
                        <div class="rank-info">
                            <div class="rank-number">Rank ${String(i + 1).padStart(2, '0')}</div>
                            <h2 class="rank-name">${rank.rank}</h2>
                            <div class="rank-stats">
                                <div class="rank-stat">
                                    <span class="rank-stat-value" data-count="${rank.hours}">${rank.hours}</span>
                                    <span class="rank-stat-label">Hours</span>
                                </div>
                                <div class="rank-stat">
                                    <span class="rank-stat-value">${rank.distanceKm}</span>
                                    <span class="rank-stat-label">Kilometers</span>
                                </div>
                                <div class="rank-stat">
                                    <span class="rank-stat-value">${rank.distanceMi}</span>
                                    <span class="rank-stat-label">Miles</span>
                                </div>
                            </div>
                            <div class="rank-divider"></div>
                            <p class="rank-subtitle">${rank.subtitle}</p>
                            <p class="rank-description">${rank.description}</p>
                        </div>
                    </div>
                </section>
            `).join('');
        }

        // ============================================
        // SCROLL SPY & ACTIVE TIMELINE
        // ============================================
        function setupScrollSpy() {
            const sections = document.querySelectorAll('.rank-section');
            const timelineItems = document.querySelectorAll('.timeline-item');
            const timelineWrapper = document.getElementById('timeline-wrapper');

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    // Visibility animation
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, {
                threshold: 0.15,
                rootMargin: '-50px 0px'
            });

            sections.forEach(section => observer.observe(section));

            // Scroll spy for timeline highlighting
            window.addEventListener('scroll', () => {
                const scrollY = window.scrollY;

                // Toggle timeline shadow
                if (scrollY > 400) {
                    timelineWrapper.classList.add('scrolled');
                } else {
                    timelineWrapper.classList.remove('scrolled');
                }

                // Find active section
                let activeId = null;
                sections.forEach(section => {
                    const rect = section.getBoundingClientRect();
                    const timelineHeight = timelineWrapper.offsetHeight;
                    if (rect.top <= timelineHeight + 100 && rect.bottom > timelineHeight) {
                        activeId = section.id;
                    }
                });

                // Update timeline active state
                timelineItems.forEach(item => {
                    if (item.dataset.target === activeId) {
                        item.classList.add('active');
                    } else {
                        item.classList.remove('active');
                    }
                });
            });
        }

        // ============================================
        // TIMELINE CLICK NAVIGATION
        // ============================================
        function setupTimelineNavigation() {
            document.getElementById('timeline').addEventListener('click', (e) => {
                const item = e.target.closest('.timeline-item');
                if (!item) return;

                const targetId = item.dataset.target;
                const targetSection = document.getElementById(targetId);
                if (targetSection) {
                    targetSection.scrollIntoView({ behavior: 'smooth' });
                }
            });

            // Keyboard support
            document.getElementById('timeline').addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    const item = e.target.closest('.timeline-item');
                    if (!item) return;
                    e.preventDefault();

                    const targetId = item.dataset.target;
                    const targetSection = document.getElementById(targetId);
                    if (targetSection) {
                        targetSection.scrollIntoView({ behavior: 'smooth' });
                    }
                }
            });
        }

        // ============================================
        // GOLD PARTICLES
        // ============================================
        function setupParticles() {
            const canvas = document.getElementById('particles-canvas');
            const ctx = canvas.getContext('2d');
            let particles = [];
            let animationId;

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }

            function createParticle() {
                return {
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2 + 0.5,
                    speedY: -(Math.random() * 0.3 + 0.1),
                    speedX: (Math.random() - 0.5) * 0.2,
                    opacity: Math.random() * 0.4 + 0.1,
                    fadeDirection: Math.random() > 0.5 ? 1 : -1,
                    fadeSpeed: Math.random() * 0.005 + 0.002
                };
            }

            function init() {
                resize();
                particles = [];
                const count = Math.min(Math.floor(canvas.width * 0.04), 50);
                for (let i = 0; i < count; i++) {
                    particles.push(createParticle());
                }
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                particles.forEach((p, i) => {
                    p.x += p.speedX;
                    p.y += p.speedY;
                    p.opacity += p.fadeDirection * p.fadeSpeed;

                    if (p.opacity >= 0.5) p.fadeDirection = -1;
                    if (p.opacity <= 0.05) p.fadeDirection = 1;

                    if (p.y < -10 || p.x < -10 || p.x > canvas.width + 10) {
                        particles[i] = createParticle();
                        particles[i].y = canvas.height + 10;
                    }

                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(201, 168, 76, ${p.opacity})`;
                    ctx.fill();
                });

                animationId = requestAnimationFrame(animate);
            }

            window.addEventListener('resize', () => {
                resize();
            });

            init();
            animate();
        }

        // ============================================
        // INIT
        // ============================================
        document.addEventListener('DOMContentLoaded', () => {
            renderTimeline();
            renderRanks();
            setupScrollSpy();
            setupTimelineNavigation();
            setupParticles();
        });
    </script>
</body>
</html>
